<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Pendaftaran</title>
    <link rel="stylesheet" href="Pendaftaran.css">

    <link rel="icon" type="image/png" href="/public/file/Image/icon/Logo.png">
    <link rel="shortcut icon" type="image/png" href="../file/Image/icon/Logo.png">
    <link rel="apple-touch-icon" href="../file/Image/icon/Logo.png">

</head>

<body>
    <div class="header">
        <div class="header-right">
            <h1 class="V-collection"></h1>
            <div class="pagination-container">
                <img src="../file/Image/icon/Logo.png" alt="Logo" class="logo">
                <div class="pagination">
                    <a href="../index.html">Beranda</a> | 
                    <a href="../Prestasi_dan_Kegiatan/Prestasi dan Kegiatan.html"> Kegiatan dan Keseharian</a>
                    <div class="website-title">SELAMAT DATANG DI YAYASAN PONDOK PESANTREN DAARUSSALAAM</div>
                </div>
            </div>
        </div>
        
        <div class="separator"></div>
    </div>

    <div class="content">
        <div class="content-container">
            <div class="content-text">
                <h1>Formulir Pendaftaran</h1>
                <form>
                    <div class="form-group">
                        <label for="nama-lengkap">Nama Lengkap:</label>
                        <input type="text" id="nama-lengkap" name="nama-lengkap" required><br>
                    </div>
                    
                    <div class="form-group">
                        <label for="nisn">NIK/NISN:</label>
                        <input type="text" id="nisn" name="nisn" required><br>
                    </div>

                    <div class="form-group">
                        <label for="tempat-tanggal-lahir">Tempat, Tanggal Lahir:</label>
                        <div style="flex: 2; display: flex; gap: 10px;">
                            <input type="text" id="tempat-lahir" name="tempat-lahir" placeholder="Tempat" required>
                            <input type="date" id="tanggal-lahir" name="tanggal-lahir" placeholder="00/00/0000" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Jenis Kelamin:</label>
                        <div>
                            <input type="radio" id="laki-laki" name="jenis-kelamin" value="laki-laki" required>
                            <label for="laki-laki">Laki-laki</label>
                            <input type="radio" id="perempuan" name="jenis-kelamin" value="perempuan">
                            <label for="perempuan">Perempuan</label>
                        </div>
                    </div>

                    <label for="alamat">Alamat:</label>
                    <textarea id="alamat" name="alamat" required></textarea><br>

                    <div class="form-group">
                        <label for="asal-sekolah">Asal Sekolah:</label>
                        <input type="text" id="asal-sekolah" name="asal-sekolah" required><br>
                    </div>

                    <div class="form-group">
                        <label for="jurusan">Jenjang Pendidikan:</label>
                        <div style="flex: 2; display: flex; gap: 10px;">
                            <select id="jurusan" name="jurusan" required>
                                <option value="">Pilih Pendidikan</option>
                                <option value="jurusan1">KOBER</option>
                                <option value="jurusan2">RA</option>
                                <option value="jurusan3">TKA/TPA</option>
                                <option value="jurusan3">SD</option>
                                <option value="jurusan3">SMP</option>
                                <option value="jurusan3">SMA</option>
                            </select><br>
                            <input type="radio" id="Mondok" name="Mondok" value="Mondok">
                            <label for="Mondok">Mondok</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Alamat Email:</label>
                        <input type="email" id="email" name="email" placeholder="opsional"><br>
                    </div>

                    <div class="form-group">
                        <label for="no-hp">No HP / WA:</label>
                        <input type="text" id="no-hp" name="no-hp" required><br>
                    </div>
                    
                    <div class="form-group">
                        <label for="nama-ayah">Nama Ayah:</label>
                        <input type="text" id="nama-ayah" name="nama-ayah" required><br>
                    </div>

                    <div class="form-group">
                        <label for="pekerjaan-ayah">Pekerjaan Ayah:</label>
                        <input type="text" id="pekerjaan-ayah" name="pekerjaan-ayah" required><br>
                    </div>

                    <div class="form-group">
                        <label for="nama-ibu">Nama Ibu:</label>
                        <input type="text" id="nama-ibu" name="nama-ibu" required><br>
                    </div>

                    <div class="form-group">
                        <label for="pekerjaan-ibu">Pekerjaan Ibu:</label>
                        <input type="text" id="pekerjaan-ibu" name="pekerjaan-ibu" required><br>
                    </div>

                    <div class="form-group">
                        <label for="Foto-ktp"> Foto Ktp Orang tua / Wali : </label>
                        <input type="file" id="foto-ktp" name="foto-ktp" accept="image/*" required>
                    </div>

                    <div class="form-group">
                        <label for="foto-kk">Foto Kartu Keluarga (KK):</label>
                        <input type="file" id="foto-kk" name="foto-kk" accept="image/*" required>
                    </div>

                    <div class="form-group">
                        <div class="Buttons">
                            <button type="submit">Daftar</button>
                            <button type="reset">Reset</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
